<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSense AI | Intelligent Recommendations Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- React & Babel for single-file interactivity -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .gradient-text { background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .product-card:hover { transform: translateY(-5px); border-color: #6366f1; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function Dashboard() {
            const [view, setView] = useState('recommendations'); // 'recommendations' | 'explorer' | 'analytics'
            const [userId, setUserId] = useState('12345');
            const [recommendations, setRecommendations] = useState([]);
            const [allProducts, setAllProducts] = useState([]);
            const [categories, setCategories] = useState(['All']);
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState('');
            const [selectedCat, setSelectedCat] = useState('All');

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // Fetch initial products
            useEffect(() => {
                const loadData = async () => {
                    try {
                        const [prodRes, catRes] = await Promise.all([
                            fetch('/api/api/products'),
                            fetch('/api/api/categories')
                        ]);
                        const prods = await prodRes.json();
                        const cats = await catRes.json();
                        setAllProducts(prods);
                        setCategories(['All', ...cats]);
                    } catch (err) {
                        console.error("Failed to load products/categories", err);
                    }
                };
                loadData();
            }, []);

            // Generate Recommendations
            const generateRecommendations = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`/api/recommend/${userId}?n=10`);
                    const data = await res.json();
                    if(data.recommendations) {
                        // Map IDs to actual product info from 'allProducts'
                        const fullRecs = data.recommendations.map(id => {
                            const found = allProducts.find(p => p.StockCode === id || p.product_id === id);
                            return found || { StockCode: id, Description: `Product ${id}`, Category: 'AI Choice', Price: 999 };
                        });
                        setRecommendations(fullRecs);
                    }
                } catch (err) {
                    alert("Error reaching engine. Is Vercel API deployed?");
                }
                setLoading(false);
            };

            // Handle View Changes
            useEffect(() => {
                if (view === 'analytics' && chartRef.current) {
                    renderChart();
                }
            }, [view]);

            const renderChart = () => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                
                // Group by category for mock analytics
                const counts = {};
                allProducts.forEach(p => {
                    const cat = p.Category || 'Other';
                    counts[cat] = (counts[cat] || 0) + 1;
                });

                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(counts).slice(0, 6),
                        datasets: [{
                            data: Object.values(counts).slice(0, 6),
                            backgroundColor: ['#6366f1', '#a855f7', '#f43f5e', '#10b981', '#f59e0b', '#3b82f6'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        cutout: '70%',
                        plugins: { legend: { position: 'bottom', labels: { color: '#f8fafc' } } }
                    }
                });
            };

            const filteredProducts = allProducts.filter(p => {
                const matchesSearch = p.Description?.toLowerCase().includes(search.toLowerCase()) || 
                                     p.StockCode?.toString().includes(search);
                const matchesCat = selectedCat === 'All' || p.Category === selectedCat;
                return matchesSearch && matchesCat;
            });

            return (
                <div className="min-h-screen flex flex-col items-center">
                    {/* Header */}
                    <header className="w-full max-w-7xl px-8 py-6 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-indigo-500 flex items-center justify-center text-2xl">🛍️</div>
                            <h1 className="text-2xl font-bold gradient-text">ShopSense AI</h1>
                        </div>
                        <nav className="flex gap-1 glass rounded-full p-1 text-sm font-medium">
                            <button 
                                onClick={() => setView('recommendations')} 
                                className={`px-5 py-2 rounded-full transition-all ${view === 'recommendations' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}>
                                Recommendations
                            </button>
                            <button 
                                onClick={() => setView('explorer')} 
                                className={`px-5 py-2 rounded-full transition-all ${view === 'explorer' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}>
                                Product Explorer
                            </button>
                            <button 
                                onClick={() => setView('analytics')} 
                                className={`px-5 py-2 rounded-full transition-all ${view === 'analytics' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}>
                                Analytics
                            </button>
                        </nav>
                    </header>

                    <main className="w-full max-w-7xl px-8 py-4">
                        {/* Recommendations View */}
                        {view === 'recommendations' && (
                            <section className="fade-in">
                                <div className="glass rounded-3xl p-10 flex flex-col md:flex-row items-center justify-between gap-10 mb-12">
                                    <div className="flex-1">
                                        <h2 className="text-4xl font-extrabold mb-4">Hello, Personalization. 🪄</h2>
                                        <p className="text-slate-400 text-lg mb-8">Enter a User ID to unlock AI-curated product selections tailored to your unique shopping behavior.</p>
                                        <div className="flex gap-4 max-w-md">
                                            <input 
                                                type="text" 
                                                value={userId}
                                                onChange={(e) => setUserId(e.target.value)}
                                                className="flex-1 bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 focus:ring-2 ring-indigo-500 outline-none transition-all"
                                                placeholder="User ID (e.g. 10045)"
                                            />
                                            <button 
                                                onClick={generateRecommendations}
                                                disabled={loading}
                                                className="bg-indigo-600 hover:bg-indigo-500 px-8 py-4 rounded-2xl font-bold transition-all disabled:opacity-50">
                                                {loading ? 'Thinking...' : 'Curate'}
                                            </button>
                                        </div>
                                    </div>
                                    <div className="w-full md:w-1/3 flex justify-center">
                                        <div className="w-64 h-64 rounded-full border-4 border-indigo-500/30 flex items-center justify-center animate-pulse">
                                            <span className="text-8xl">🔮</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {recommendations.length > 0 ? (
                                        recommendations.map((item, idx) => (
                                            <div key={idx} className="glass rounded-2xl overflow-hidden p-6 product-card border transition-all">
                                                <div className="w-full aspect-square bg-slate-800 rounded-xl mb-6 flex items-center justify-center text-5xl">📦</div>
                                                <div className="text-xs text-indigo-400 font-bold uppercase tracking-widest mb-2">{item.Category || 'Discovery'}</div>
                                                <h3 className="font-semibold text-lg mb-4 line-clamp-1">{item.Description}</h3>
                                                <div className="flex justify-between items-center pt-4 border-t border-slate-700">
                                                    <span className="text-rose-400 font-bold text-xl">₹{item.Price || '799'}</span>
                                                    <span className="text-yellow-400 font-medium">★ 4.{Math.floor(Math.random()*9)}</span>
                                                </div>
                                            </div>
                                        ))
                                    ) : !loading && (
                                        <div className="col-span-full py-20 text-center text-slate-500 text-xl font-light italic">
                                            No collection active. Start by entering a User ID.
                                        </div>
                                    )}
                                </div>
                            </section>
                        )}

                        {/* Explorer View */}
                        {view === 'explorer' && (
                            <section className="fade-in">
                                <div className="mb-10 flex flex-col md:flex-row gap-6">
                                    <input 
                                        type="text" 
                                        value={search}
                                        onChange={(e) => setSearch(e.target.value)}
                                        className="flex-1 bg-slate-800 border-none rounded-2xl px-6 py-4 outline-none focus:bg-slate-700 transition-all"
                                        placeholder="Search by name or code..."
                                    />
                                    <select 
                                        value={selectedCat}
                                        onChange={(e) => setSelectedCat(e.target.value)}
                                        className="bg-slate-800 rounded-2xl px-6 py-4 outline-none">
                                        {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                                    {filteredProducts.slice(0, 20).map((item, idx) => (
                                        <div key={idx} className="glass rounded-xl p-4 hover:bg-slate-800 cursor-pointer transition-all border border-transparent hover:border-slate-600">
                                            <div className="text-xs text-slate-500 mb-1">{item.StockCode}</div>
                                            <div className="font-medium text-sm line-clamp-2 mb-2">{item.Description}</div>
                                            <div className="text-indigo-400 font-bold text-sm">₹{item.Price || '499'}</div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {/* Analytics View */}
                        {view === 'analytics' && (
                            <section className="fade-in flex flex-col items-center">
                                <div className="glass rounded-3xl p-10 w-full max-w-2xl">
                                    <h2 className="text-2xl font-bold mb-8 text-center">Product Catalog Insights</h2>
                                    <canvas ref={chartRef}></canvas>
                                    <div className="mt-12 grid grid-cols-2 gap-4 text-center">
                                        <div className="bg-indigo-500/10 p-6 rounded-2xl">
                                            <div className="text-slate-400 text-sm mb-1 uppercase tracking-wider">Total Products</div>
                                            <div className="text-3xl font-bold text-indigo-400">{allProducts.length}</div>
                                        </div>
                                        <div className="bg-purple-500/10 p-6 rounded-2xl">
                                            <div className="text-slate-400 text-sm mb-1 uppercase tracking-wider">Categories</div>
                                            <div className="text-3xl font-bold text-purple-400">{categories.length - 1}</div>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}
                    </main>

                    <footer className="mt-auto py-12 text-slate-500 text-sm">
                        © 2026 ShopSense AI • Professional Vercel Deployment • Connecting Business to Insights.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
